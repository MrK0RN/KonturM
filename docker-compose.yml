# Полный стек: из корня репозитория — `docker compose up --build`
# API: http://localhost:8000  (витрина design подключается через Symfony)
# Mailpit UI: http://localhost:8025

services:
  app:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-496f664afff3a3d54cd4176e029a0561}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-ChangeMe}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-59ca8714b04e5adaa0c226a8ebf7f8274f1731d24399b431e20643370c07b0bd}
      # Не через ${MAILER_DSN}, чтобы api/.env с null://null не ломал Mailpit при `docker compose` из каталога api/
      MAILER_DSN: smtp://mailer:1025
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-'^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      # Витрина design/ лежит рядом с api/ — в контейнере путь /design (см. DesignStorefrontController)
      - ./design:/design:ro
      # Опционально: правки кода без пересборки (vendor из образа)
      - ./api:/app
      - api_vendor:/app/vendor
      - api_var:/app/var

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  mailer:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  database_data:
  api_vendor:
  api_var:
